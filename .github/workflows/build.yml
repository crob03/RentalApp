name: Build & Test

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore workloads
        run: dotnet workload restore ./RentalApp/RentalApp.csproj

      - name: Restore dependencies
        run: dotnet restore ./RentalApp.sln

      - name: Build
        env:
          CONNECTION_STRING: {{ secrets.TEST_CONNECTION_STRING }}
        run: dotnet build ./RentalApp/RentalApp.csproj -c Release --no-restore

      - name: Test
        env:
          CONNECTION_STRING: {{ secrets.TEST_CONNECTION_STRING }}
        run:  dotnet test ./RentalApp.sln --no-build

